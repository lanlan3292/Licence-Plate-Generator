<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plate Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Noto+Color+Emoji&family=Noto+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/app.css">
</head>
<body>

<div id="loading"><div class="spinner"></div></div>
<div id="keys-banner"></div>

<header>
  <div class="logo">PLATES</div>
  <div class="sub" id="hdr-sub"></div>
  <div class="spacer"></div>
  <button id="theme-toggle" title="Toggle light/dark theme">☀</button>
  <div class="lang-sw" id="lang-sw">
    <button class="custom-dd-btn" id="lang-btn">
      <span id="lang-flag" class="opt-flag">🌐</span>
      <span id="lang-label"></span>
      <span class="dd-chevron">▼</span>
    </button>
    <div class="custom-dd-panel" id="lang-dd">
      <div class="custom-dd-opts" id="lang-dd-opts"></div>
      <div class="dd-hint-strip" id="lang-ctrl-hint">?debug_lang=1 → raw key names</div>
    </div>
  </div>
</header>

<main>
  <aside class="sidebar">

    <div class="field-group">
      <label id="lbl-country"></label>
      <div class="country-dd-wrap" id="country-dd-wrap">
        <button class="custom-dd-btn" id="country-btn">
          <span class="btn-flag" id="country-btn-flag">🌍</span>
          <span class="btn-name" id="country-btn-name">—</span>
          <span class="dd-chevron">▼</span>
        </button>
        <div class="custom-dd-panel" id="country-dd">
          <div class="custom-dd-opts" id="country-dd-opts"></div>
        </div>
      </div>
    </div>

    <div class="field-group" id="type-field" style="display:none">
      <label id="lbl-type">Type</label>
      <div class="type-pills" id="type-pills"></div>
    </div>

    <div class="field-group">
      <label id="lbl-text"></label>
      <input type="text" id="plate-text" maxlength="20" autocomplete="off" spellcheck="false">
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btn-generate"></button>
      <button class="btn btn-ghost"   id="btn-random"></button>
    </div>

    <div class="divider"></div>

    <div class="field-group">
      <label id="lbl-res"></label>
      <div class="res-row">
        <input type="number" id="res-w" min="100" max="9999" value="1040">
        <span class="sep">×</span>
        <input type="number" id="res-h" min="50"  max="9999" value="220">
        <select id="res-unit">
          <option value="px">px</option>
          <option value="2">2×</option>
          <option value="3">3×</option>
          <option value="4">4×</option>
        </select>
      </div>
      <div class="res-presets" id="res-presets"></div>
      <div class="hint" id="res-hint"></div>
    </div>

    <div class="divider"></div>

    <div class="field-group">
      <label id="lbl-link"></label>
      <div class="link-box">
        <code id="link-display">–</code>
        <button id="btn-copy">⎘</button>
      </div>
      <div class="copied-toast hidden" id="copy-toast"></div>
      <div class="hint" id="link-hint"></div>
    </div>
    <button class="btn btn-secondary" id="btn-open-link"></button>

    <div class="divider"></div>

    <div class="history-title" id="hist-title"></div>
    <div class="history-list"  id="history-list"></div>

  </aside>

  <section class="preview-area">
    <div class="preview-label" id="preview-label"></div>

    <div id="plate-canvas-wrap">
      <div id="plate-canvas-inner">
        <div class="empty-state" id="empty-state">
          <div class="empty-plate-mock"><span class="mock-text">· · · · ·</span></div>
          <div>
            <h3 id="empty-title"></h3>
            <p id="empty-msg" style="margin-top:6px"></p>
          </div>
          <div class="empty-steps" id="empty-steps"></div>
        </div>
        <canvas id="plate-canvas" style="display:none"></canvas>
      </div>
    </div>

    <div class="res-badge" id="res-badge" style="display:none"></div>

    <div class="action-row" id="action-row" style="display:none">
      <button class="btn btn-primary" id="btn-download"></button>
      <button class="btn btn-ghost"   id="btn-add-history"></button>
    </div>
  </section>
</main>

<script src="assets/error-ui.js"></script>
<script src="assets/i18n.js"></script>
<script src="assets/renderer.js"></script>
<script src="assets/plate-registry.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
