<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plate</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; font-family: 'Noto Sans', system-ui, sans-serif; }
  canvas, img { display: block; max-width: 100%; }

  /* Plain-text error for plate.html — no fancy card needed */
  #err {
    padding: 16px;
    font-size: 13px;
    color: #c97070;
    font-family: 'IBM Plex Mono', 'Consolas', monospace;
    white-space: pre-wrap;
    line-height: 1.6;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>

<script src="assets/renderer.js"></script>
<script src="assets/plate-registry.js"></script>
<script>
(async () => {
  const params  = new URLSearchParams(location.search);
  const country = (params.get("country") || "").toLowerCase();
  const type    = (params.get("type")    || "standard").toLowerCase();
  const text    = (params.get("text")    || "").toUpperCase().trim();
  const fmt     = (params.get("fmt")     || "png").toLowerCase();
  const reqW    = parseInt(params.get("w") || "0");

  const root = document.getElementById("root");

  function showErr(msg) {
    const d = document.createElement("div");
    d.id = "err";
    d.textContent = msg;
    root.appendChild(d);
  }

  if (!country) { showErr("Error: missing ?country= parameter.\n\nExample: plate.html?country=de&text=B·AB 1234"); return; }
  if (!text)    { showErr("Error: missing ?text= parameter.\n\nExample: plate.html?country=de&text=B·AB 1234"); return; }

  try {
    await PlateRegistry.load(country, type);
  } catch (err) {
    showErr(`Error: failed to load plate file.\n  country="${country}"  type="${type}"\n  file: assets/plate/${country}/${type}.js\n\n${err.message || err}`);
    return;
  }

  const cfg = PlateRegistry.get(`${country}:${type}`) || PlateRegistry.get(country);
  if (!cfg) {
    const warns = PlateRegistry.warnings.join("; ") || "(none)";
    showErr(`Error: unknown plate — country="${country}" type="${type}"\n\nLoad warnings: ${warns}`);
    return;
  }

  try {
    const scale  = reqW > 0 ? reqW / cfg.width : 2;
    const canvas = document.createElement("canvas");
    PlateRenderer.draw(canvas, cfg, text, scale);

    if (fmt === "canvas") {
      root.appendChild(canvas);
    } else {
      canvas.toBlob(blob => {
        if (!blob) {
          showErr("Error: canvas export failed (toBlob returned null).\nTry opening via a local server instead of file://.");
          return;
        }
        const img = new Image();
        img.src   = URL.createObjectURL(blob);
        img.alt   = `${country.toUpperCase()} ${type !== "standard" ? type + " " : ""}${text}`;
        img.title = img.alt;
        root.appendChild(img);
      }, "image/png");
    }
  } catch (err) {
    showErr(`Error: render failed.\n  country=${country}  type=${type}  text=${text}\n\n${err.message || err}\n\n${err.stack || ""}`);
  }
})();
</script>
</body>
</html>
